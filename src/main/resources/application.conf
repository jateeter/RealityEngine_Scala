akka {
  loglevel = "INFO"
  stdout-loglevel = "INFO"

  http {
    server {
      idle-timeout = 60s
      request-timeout = 30s
      max-connections = 1024
    }
    parsing {
      max-content-length = 5m
    }
  }

  # Use fork-join-executor for blocking VectorStore calls
  blocking-io-dispatcher {
    type = Dispatcher
    executor = "thread-pool-executor"
    thread-pool-executor {
      fixed-pool-size = 16
    }
    throughput = 1
  }
}
