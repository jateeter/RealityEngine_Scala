akka {
  loglevel = "INFO"
  stdout-loglevel = "INFO"

  http.server {
    # WebSocket connections must never be closed due to inactivity —
    # keep-alive pings below handle dead-connection detection instead.
    idle-timeout = infinite

    websocket {
      # Send a Ping frame every 30 s when the connection is quiet.
      # The client (browser / nginx) replies with a Pong, which both keeps
      # the TCP session alive and lets Akka detect truly dead connections.
      periodic-keep-alive-max-idle = 30 seconds
      periodic-keep-alive-mode = pong
    }
  }
}

blocking-io-dispatcher {
  type = Dispatcher
  executor = "thread-pool-executor"
  thread-pool-executor {
    fixed-pool-size = 4
  }
  throughput = 1
}
